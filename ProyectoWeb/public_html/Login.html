<!DOCTYPE html>
<html>
    <head>
        <title>Apex Digital</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="Vista/Login.css" rel="stylesheet" type="text/css"/>
    </head>
    <body>
        <div class="card">
            <input type="checkbox" class="toggle" id="toggle"/>
            <div class="card-bg"></div>
            <div class="hero signup">
                <h2>Bienvenido de Vuelta</h2>
                <p>Iniciar sesion para tu ultima sesion...</p>
                <label for="toggle">INICIAR SESION</label>
            </div>
            <div class="form signup">
                <h2>Crea una Cuenta</h2>
            </div>
            <div class="hero signin">
                <h2>Hey Tu!</h2>
                <p>Comienza tu viaje usando esto...</p>
                <label for="toggle">REGISTRARTE</label>
            </div>
            <div class="form signin">
                <h2>Iniciar Sesion</h2>
                <p>Nombre de Usuario</p>
                <input type="text"/>
                <a href="index.html">Ingresar</a>
            </div>
        </div>
    </body>
</html>
